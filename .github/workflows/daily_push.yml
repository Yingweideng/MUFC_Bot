name: MUFC AI Bot Service

on:
  schedule:
    # 每 30 分钟检查一次实时消息，且包含早上 6 点的汇总
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 授予 Actions 写入仓库的权限
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install feedparser requests google-genai python-dotenv --upgrade

      - name: Execute Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # 提前开启 Node.js 24 强制选项以消除警告          
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python mufc_bot.py

      - name: Commit and Push if updated
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add pushed_links.txt
          git commit -m "Update pushed links database [skip ci]" || exit 0
          git push
