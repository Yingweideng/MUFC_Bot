name: MUFC Daily Push

on:
  schedule:
    # 国际标准时间 22:00 对应北京时间 次日 06:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run script
        env:
          # 在 GitHub Repo Settings -> Secrets 中配置这些变量
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python mufc_bot.py
